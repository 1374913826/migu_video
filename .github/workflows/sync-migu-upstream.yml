name: 自动同步咪咕视频仓库
于:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: 添加上游仓库
        run: |
          git remote add upstream https://github.com/develop202/migu_video.git
          git config user.name "1374913826"
          git config user.email "1374913826@users.noreply.github.com"
      - name: 合并上游更新
        run: |
          git fetch upstream
                - name: 拉取并合并自定义直播源
        run: |
          curl -o custom.m3u https://raw.githubusercontent.com/wuge1234567890/zb/main/m3u/migu.m3u
          cat custom.m3u >> migu.m3u
          git add migu.m3u
          git commit -m "合并自定义直播源更新" || echo "无新内容，跳过提交"

          git merge upstream/main --no-edit --allow-unrelated-histories
          git push origin main
