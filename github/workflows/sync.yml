name: Sync Upstream

on:
  # 每天 UTC 0 点（北京时间 8 点）自动运行
  schedule:
    - cron: '0 0 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/develop202/migu_video.git

      - name: Fetch upstream changes
        run: |
          git fetch upstream --tags

      - name: Merge upstream changes
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories -m "chore: sync with upstream"

      - name: Push changes to origin
        run: |
          git push origin main
          git push --tags
